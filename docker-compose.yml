version: "3.9"

services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runtime
    image: safeprompt-api:latest
    container_name: safeprompt_api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    restart: unless-stopped
    networks:
      - safeprompt_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: safeprompt_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - safeprompt_net
    restart: unless-stopped

networks:
  safeprompt_net:
    driver: bridge
